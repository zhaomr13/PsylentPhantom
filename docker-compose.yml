version: '3.8'
services:
  postgres:
    image: postgres:12.13
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: psylent
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
